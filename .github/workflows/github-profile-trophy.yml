name: GitHub Profile Trophy

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual triggering
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed for git-auto-commit-action
    steps:
      - uses: actions/checkout@v3
      - name: Generate GitHub Profile Trophy
        uses: Erik-Donath/github-profile-trophy@feature/generate-svg
        with:
          username: rifat-hasan-shakil
          token: ${{ secrets.GITHUB_TOKEN }}
          file: assets/trophy.svg
          theme: radical
          no-background: true
          no-frame: true
          margin-width: 15
      
      - name: Commit & Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update GitHub Profile Trophy"
          file_pattern: assets/trophy.svg
